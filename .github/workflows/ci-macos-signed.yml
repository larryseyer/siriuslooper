name: ci-macos-signed

# =============================================================================
# Signed macOS build + GUI smoke verification.
#
# Runs separately from ci.yml so the existing push/PR matrix isn't slowed by
# the Xcode-generator build, and so the signing secrets only attach to a
# job that needs them. macOS-only — per the project's macOS-first rule, the
# Linux/Windows half of the test matrix lives in ci.yml.
#
# REQUIRED REPO SECRETS (operator one-time setup before first run):
#   DEVELOPER_ID_CERT_P12_BASE64 — base64 of the Developer ID Application
#                                  cert exported from Keychain Access as
#                                  .p12, e.g. `base64 -i Developer-ID.p12 \
#                                  | pbcopy`
#   DEVELOPER_ID_CERT_PASSWORD   — password set during the .p12 export
#   APPLE_ID                     — Apple ID for notarization (itunes@…)
#   APPLE_APP_PASSWORD           — app-specific password from appleid.apple.com
#                                  (NOT the Apple ID password itself)
#   APPLE_TEAM_ID                — RR5DY39W4Q
#   KEYCHAIN_PASSWORD            — any opaque string; throwaway keychain pwd
#
# APPLE_ID / APPLE_APP_PASSWORD / APPLE_TEAM_ID are only consumed by a
# future notarization step (not run here). Listed for completeness so the
# operator adds them once and they're ready when notarization moves into
# a release-tag workflow.
#
# The GUI smoke step uses continue-on-error: GitHub-hosted macOS runners
# typically can't grant the `runner` user Accessibility permission (SIP
# blocks the workaround on hosted runners), so smoke is a best-effort
# signal. Build + sign + codesign-verify is the hard gate.
# =============================================================================

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  signed-smoke:
    name: macOS signed build + smoke
    runs-on: macos-latest
    env:
      APP_BUNDLE: build-xcode/app/SiriusLooper_artefacts/Release/Sirius Looper.app
    steps:
      - uses: actions/checkout@v5

      - name: Fetch vendored dependencies
        run: bash bash/setup-deps.sh

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KC_PWD:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KC_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PWD" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$CERT_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KC_PWD" build.keychain >/dev/null
          rm /tmp/cert.p12

      - name: Configure signed Xcode build
        run: cmake -B build-xcode -G Xcode

      - name: Build signed bundle
        run: cmake --build build-xcode --config Release --target SiriusLooper

      - name: Verify signing
        run: |
          set -euo pipefail
          codesign --verify --deep --strict "$APP_BUNDLE"
          CS_OUT="$(codesign -dvv "$APP_BUNDLE" 2>&1)"
          echo "$CS_OUT"
          grep -q "TeamIdentifier=RR5DY39W4Q" <<<"$CS_OUT"
          grep -q "flags=0x10000(runtime)" <<<"$CS_OUT"
          grep -q "Authority=Developer ID Application: Larry Seyer (RR5DY39W4Q)" <<<"$CS_OUT"
          spctl -a -t exec -vv "$APP_BUNDLE"

      - name: GUI smoke (best-effort)
        id: smoke
        continue-on-error: true
        run: bash bash/smoke-persistence.sh

      - name: Report GUI smoke result
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "GUI smoke: PASS"
          else
            echo "GUI smoke: SKIPPED/FAILED on CI runner (likely Accessibility/TCC)."
            echo "Build + sign + signing-verify all passed; smoke remains an"
            echo "operator-local gate via bash/autotest.sh."
          fi

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
